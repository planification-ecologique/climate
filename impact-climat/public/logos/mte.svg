<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60">
  <!-- Ministère de la Transition Écologique -->
  <!-- Marianne Symbol -->
  <g transform="translate(10, 5)">
    <polygon points="20,0 0,40 40,40" fill="#000091"/>
    <circle cx="20" cy="18" r="6" fill="white"/>
  </g>
  <!-- Text -->
  <text x="60" y="18" font-family="Marianne, Arial, sans-serif" font-size="9" fill="#000091" font-weight="bold">MINISTÈRE</text>
  <text x="60" y="30" font-family="Marianne, Arial, sans-serif" font-size="9" fill="#000091">DE LA TRANSITION</text>
  <text x="60" y="42" font-family="Marianne, Arial, sans-serif" font-size="9" fill="#000091">ÉCOLOGIQUE</text>
  <!-- Tricolor bar -->
  <rect x="60" y="48" width="20" height="4" fill="#0055A4"/>
  <rect x="80" y="48" width="20" height="4" fill="white" stroke="#e5e5e5" stroke-width="0.5"/>
  <rect x="100" y="48" width="20" height="4" fill="#EF4135"/>
</svg>
