<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <defs>
    <linearGradient id="data-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="200" fill="url(#data-gradient)"/>
  
  <!-- Database icon -->
  <ellipse cx="140" cy="70" rx="50" ry="15" fill="#2e7d32" opacity="0.8"/>
  <rect x="90" y="70" width="100" height="60" fill="#2e7d32" opacity="0.8"/>
  <ellipse cx="140" cy="130" rx="50" ry="15" fill="#2e7d32" opacity="0.8"/>
  <ellipse cx="140" cy="70" rx="50" ry="15" fill="#43a047"/>
  <ellipse cx="140" cy="100" rx="50" ry="15" fill="none" stroke="#1b5e20" stroke-width="2"/>
  
  <!-- Download arrow -->
  <g transform="translate(250, 60)">
    <rect x="20" y="0" width="40" height="60" fill="#1565c0" rx="3"/>
    <polygon points="40,70 20,50 30,50 30,30 50,30 50,50 60,50" fill="#1565c0"/>
    <rect x="15" y="80" width="50" height="8" fill="#1565c0" rx="2"/>
  </g>
  
  <!-- File formats -->
  <text x="260" y="170" font-size="12" fill="#333" font-weight="bold">NetCDF • CSV • GeoTIFF</text>
</svg>
