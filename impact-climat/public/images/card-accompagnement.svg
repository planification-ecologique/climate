<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <defs>
    <linearGradient id="guide-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ffe0b2"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="200" fill="url(#guide-gradient)"/>
  
  <!-- Book icon -->
  <g transform="translate(100, 40)">
    <!-- Book cover -->
    <rect x="0" y="0" width="80" height="120" fill="#e65100" rx="5"/>
    <rect x="5" y="5" width="70" height="110" fill="#fff8e1" rx="3"/>
    <!-- Book spine -->
    <rect x="0" y="0" width="10" height="120" fill="#bf360c" rx="2"/>
    <!-- Text lines -->
    <rect x="20" y="25" width="45" height="4" fill="#e65100" rx="1"/>
    <rect x="20" y="40" width="40" height="3" fill="#ccc" rx="1"/>
    <rect x="20" y="50" width="45" height="3" fill="#ccc" rx="1"/>
    <rect x="20" y="60" width="35" height="3" fill="#ccc" rx="1"/>
    <rect x="20" y="70" width="45" height="3" fill="#ccc" rx="1"/>
    <rect x="20" y="80" width="40" height="3" fill="#ccc" rx="1"/>
  </g>
  
  <!-- Question mark / help icon -->
  <g transform="translate(250, 50)">
    <circle cx="40" cy="50" r="45" fill="#1565c0" opacity="0.9"/>
    <text x="40" y="70" font-size="60" fill="white" text-anchor="middle" font-weight="bold">?</text>
  </g>
  
  <!-- Label -->
  <text x="200" y="180" font-size="14" fill="#333" text-anchor="middle" font-weight="bold">Guides • Méthodologie • FAQ</text>
</svg>
