<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <defs>
    <linearGradient id="map-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#bbdefb"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="200" fill="url(#map-gradient)"/>
  
  <!-- Simplified France outline -->
  <path d="M180 40 L220 35 L260 50 L280 80 L290 120 L270 160 L230 170 L190 160 L160 140 L150 100 L160 60 Z" 
        fill="#fff" stroke="#000091" stroke-width="2" opacity="0.8"/>
  
  <!-- Temperature gradient overlay -->
  <defs>
    <linearGradient id="temp-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fee090"/>
      <stop offset="50%" style="stop-color:#fdae61"/>
      <stop offset="100%" style="stop-color:#d73027"/>
    </linearGradient>
  </defs>
  <path d="M180 40 L220 35 L260 50 L280 80 L290 120 L270 160 L230 170 L190 160 L160 140 L150 100 L160 60 Z" 
        fill="url(#temp-gradient)" opacity="0.6"/>
  
  <!-- Map pin -->
  <circle cx="220" cy="100" r="8" fill="#000091"/>
  <circle cx="220" cy="100" r="4" fill="white"/>
  
  <!-- Legend -->
  <rect x="320" y="60" width="20" height="80" fill="url(#temp-gradient)" rx="2"/>
  <text x="345" y="70" font-size="10" fill="#333">34°C</text>
  <text x="345" y="140" font-size="10" fill="#333">10°C</text>
</svg>
